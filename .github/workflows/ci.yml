# Continuous integration for BRUV.
#
# Runs on every push and pull request to main. Tests the Go backend on all
# three target platforms and type-checks the Svelte frontend on Linux (the
# frontend is platform-agnostic, one runner is enough).
#
# The Windows job is the canonical one — it's the primary release target
# and exercises the systray code path. The macOS and Linux jobs are here
# to catch regressions early; neither platform has a signed release yet,
# but we want to know when they break so they can be fixed deliberately.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    name: Go tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -count=1

  frontend-check:
    name: Svelte type + a11y check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: svelte-check
        working-directory: frontend
        run: npx svelte-check --fail-on-warnings
