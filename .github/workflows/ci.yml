# Continuous integration for BRUV.
#
# Runs on every push and pull request to main. Tests the Go backend on all
# three target platforms and type-checks the Svelte frontend on Linux (the
# frontend is platform-agnostic, one runner is enough).
#
# The Windows job is the canonical one — it's the primary release target
# and exercises the systray code path. The macOS and Linux jobs are here
# to catch regressions early; neither platform has a signed release yet,
# but we want to know when they break so they can be fixed deliberately.
#
# Generated artifacts this workflow has to produce at runtime, because
# they are gitignored and neither Go nor Vite can find them otherwise:
#
#   - frontend/wailsjs/**   — TS/JS bindings for the Wails @App struct.
#                             Produced by `wails generate module`.
#                             Imported by src/lib/adapters/wails.ts.
#   - frontend/dist/**      — Vite production bundle (desktop UI).
#                             Produced by `npm run build` in frontend/.
#                             Embedded by main.go via //go:embed.
#   - mobile/dist/**        — Vite production bundle (mobile PWA).
#                             Produced by `npm run build` in mobile/.
#                             Embedded by mobile/embed.go via //go:embed.
#
# Both jobs below therefore follow the same prep sequence: install Node
# deps → install Wails CLI → generate bindings → build Vite bundle. The
# Go job then runs go build/test; the frontend job then runs svelte-check.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    name: Go tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1

      # Root package.json carries deps that `shared/*.ts` imports (marked,
      # lucide-svelte). Both frontend/ and mobile/ resolve those by walking
      # up from shared/ to the repo root's node_modules — so this install
      # has to happen even though no app entrypoint lives here.
      - name: Install root deps (for shared/)
        shell: bash
        run: npm ci || npm install

      - name: Install frontend deps
        working-directory: frontend
        shell: bash
        run: npm ci || npm install

      - name: Install mobile deps
        working-directory: mobile
        shell: bash
        run: npm ci || npm install

      # Chicken-and-egg: `wails generate module` compiles the Go code to
      # introspect the App struct, but main.go embeds frontend/dist and
      # mobile/embed.go embeds mobile/dist via //go:embed, so compilation
      # fails unless those directories exist. Create empty placeholders
      # first; the real `npm run build` steps below overwrite them.
      - name: Create placeholder dist directories
        shell: bash
        run: |
          mkdir -p frontend/dist
          touch frontend/dist/.placeholder
          mkdir -p mobile/dist
          touch mobile/dist/.placeholder

      # `wails generate module` produces frontend/wailsjs/** from the
      # Go App struct. This is the supported way to materialise the
      # TypeScript bindings in CI where we don't want a native binary.
      - name: Generate Wails bindings
        run: wails generate module

      # Now build the real Vite bundles, replacing the placeholders.
      - name: Build frontend bundle
        working-directory: frontend
        shell: bash
        run: npm run build

      - name: Build mobile bundle
        working-directory: mobile
        shell: bash
        run: npm run build

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -count=1

  frontend-check:
    name: Svelte type + a11y check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1

      # Root package.json carries deps that `shared/*.ts` imports (marked,
      # lucide-svelte). svelte-check resolves those by walking up from
      # shared/ to the repo root's node_modules.
      - name: Install root deps (for shared/)
        run: npm ci || npm install

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Install mobile deps
        working-directory: mobile
        run: npm ci || npm install

      # Same chicken-and-egg as the go-test job: `wails generate module`
      # compiles the Go code, which requires frontend/dist and mobile/dist
      # to exist for the //go:embed directives. Placeholders are enough.
      - name: Create placeholder dist directories
        run: |
          mkdir -p frontend/dist
          touch frontend/dist/.placeholder
          mkdir -p mobile/dist
          touch mobile/dist/.placeholder

      # svelte-check imports from wailsjs/go/main/App.js (via wails.ts
      # adapter), so the bindings need to exist before type-checking.
      - name: Generate Wails bindings
        run: wails generate module

      - name: svelte-check (frontend)
        working-directory: frontend
        run: npx svelte-check --fail-on-warnings

      - name: svelte-check (mobile)
        working-directory: mobile
        run: npx svelte-check --fail-on-warnings
