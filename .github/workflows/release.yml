# Release pipeline for BRUV.
#
# Triggered by pushing a tag that matches v*. Builds the Windows executable
# and NSIS installer via Wails, stamps the version and build date into the
# binary via ldflags, then creates a draft GitHub Release with the installer
# attached. Publish the draft (after pasting the release notes) to make it
# the latest release. Builds ship unsigned.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to build (e.g. v0.1.0-alpha)
        required: true

# GitHub's default GITHUB_TOKEN has read-only `contents` permission since
# 2022, which means softprops/action-gh-release (and any other release
# publisher) will 403 when it tries to create the draft release. Granting
# `contents: write` at the workflow level is the minimum needed to publish
# releases and upload assets via the built-in token.
permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1

      # NSIS is required by `wails build -nsis` to generate the Windows
      # installer. `wails` is a native process that reads the WINDOWS PATH, so
      # the NSIS dir must be added in Windows form (C:\...). The previous
      # MSYS-style entry (/c/Program Files (x86)/NSIS) was invalid for native
      # processes, so -nsis silently skipped the installer and the release
      # shipped exe-only (v0.1.0-alpha, and the first v0.2.0-alpha attempt).
      # Resolve makensis, add its real dir, and verify — fail loudly if absent.
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $mk = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $mk)) {
            $found = Get-ChildItem "C:\Program Files*" -Recurse -Filter makensis.exe -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $mk = $found.FullName } else { Write-Error "makensis.exe not found after 'choco install nsis'"; exit 1 }
          }
          $nsisDir = Split-Path $mk
          Add-Content -Path $env:GITHUB_PATH -Value $nsisDir
          Write-Host "NSIS at $nsisDir"
          & $mk /VERSION

      # Root package.json carries deps that `shared/*.ts` imports (marked,
      # lucide-svelte). Vite resolves those by walking up from shared/ to
      # the repo root's node_modules.
      #
      # --ignore-scripts: the root's postinstall chains into
      # `npm install --prefix frontend && npm install --prefix mobile`
      # for local-dev ergonomics. Running that here populates frontend/
      # and mobile/ node_modules, then the explicit installs below try
      # to clean and reinstall — on Windows the cleanup hits EPERM
      # because the previous npm process still has handles open.
      - name: Install root deps (for shared/)
        run: npm ci --ignore-scripts || npm install --ignore-scripts

      - name: Install frontend deps
        working-directory: frontend
        run: |
          npm ci || npm install

      - name: Install mobile deps
        working-directory: mobile
        run: |
          npm ci || npm install

      - name: Build Windows binary + NSIS installer
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          # Stamp version + build date into the binary. See app.go for the
          # var declarations these -X flags override. -nsis produces an
          # installer alongside the raw .exe; -clean wipes build/bin first.
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          wails build \
            -nsis \
            -clean \
            -trimpath \
            -ldflags "-X main.AppVersion=${VERSION} -X main.BuildDate=${BUILD_DATE}"

      # Guard against the installer silently going missing (wails does not
      # fail the build when NSIS generation is skipped/unavailable). The
      # release must never ship exe-only again.
      - name: Assert installer was produced
        shell: bash
        run: |
          ls -l build/bin
          test -f build/bin/bruv-amd64-installer.exe || {
            echo "::error::NSIS installer missing from build/bin — check makensis availability and NSIS compile output above"
            exit 1
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bruv-${{ steps.version.outputs.value }}-windows
          # Catches both the portable .exe and the NSIS installer .exe
          path: build/bin/*.exe
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: bruv-${{ needs.build-windows.outputs.version }}-windows
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-windows.outputs.version }}
          name: BRUV ${{ needs.build-windows.outputs.version }}
          draft: true
          # Not auto-derived from the version suffix: every current release is
          # an alpha/beta, and marking it pre-release breaks /releases/latest
          # (the website's download button).
          prerelease: false
          files: dist/*
          body: |
            ## BRUV ${{ needs.build-windows.outputs.version }}

            🌐 [bruv-ai.app](https://bruv-ai.app)

            <!-- Release notes go here. See plan/backlog.md for the change log. -->

            ### Install

            Download the installer below and run it. Windows SmartScreen may
            warn you during the beta — see the [README](../README.md#smartscreen-and-signing)
            for why and how to proceed.

            ### Verify

            The source is MIT-licensed and buildable from a clean checkout.
            See [CONTRIBUTING.md](../CONTRIBUTING.md) for instructions.
