<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#18181b" />

    <!-- PWA manifest. Android Chrome reads this for install + theming. -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Favicons. SVG for capable browsers, PNG fallback. -->
    <link rel="icon" type="image/svg+xml" href="/bruv-icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- iOS standalone-mode hints. iOS ignores manifest.webmanifest, so
         these meta tags drive Add-to-Home-Screen behaviour separately. -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BRUV" />

    <title>BRUV</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
